{% extends 'Inicio/base.html' %}
{% load static %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <div class="card-header text-white"
             style="background: linear-gradient(135deg, #0d6efd, #0b5ed7);">

            <h3 class="mb-0">
                <i class="fas fa-file-pdf"></i>
                Reporte de Pacientes
            </h3>

        </div>

        <div class="card-body p-4">

            <form method="GET"
                  action="{% url 'generar_pdf_pacientes' %}"
                  target="_blank">

                <div class="row">

                    <!-- TIPO REPORTE -->
                    <div class="col-md-4 mb-3">

                        <label class="form-label fw-bold">
                            Tipo de Reporte
                        </label>

                        <select name="tipo"
                                id="tipoReporte"
                                class="form-select">

                            <option value="general">
                                General
                            </option>

                            <option value="sexo">
                                Por Sexo
                            </option>

                            <option value="edad">
                                Por Edad
                            </option>

                        </select>

                    </div>

                    <!-- SEXO -->
                    <div class="col-md-4 mb-3"
                         id="sexoDiv"
                         style="display:none;">

                        <label class="form-label fw-bold">
                            Sexo
                        </label>

                        <select name="sexo"
                                class="form-select">

                            <option value="MASCULINO">
                                Masculino
                            </option>

                            <option value="FEMENINO">
                                Femenino
                            </option>

                        </select>

                    </div>

                    <!-- EDAD -->
                    <div class="col-md-4 mb-3"
                         id="edadDiv"
                         style="display:none;">

                        <label class="form-label fw-bold">
                            Edad mínima
                        </label>

                        <input type="number"
                               name="edad"
                               class="form-control"
                               min="0">

                    </div>

                </div>

                <div class="text-end mt-3">

                    <button type="submit"
                            class="btn btn-primary btn-lg">

                        <i class="fas fa-download"></i>
                        Generar PDF

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script>

    const tipoReporte = document.getElementById('tipoReporte');
    const sexoDiv = document.getElementById('sexoDiv');
    const edadDiv = document.getElementById('edadDiv');

    tipoReporte.addEventListener('change', function () {

        sexoDiv.style.display = 'none';
        edadDiv.style.display = 'none';

        if (this.value === 'sexo') {
            sexoDiv.style.display = 'block';
        }

        if (this.value === 'edad') {
            edadDiv.style.display = 'block';
        }

    });

</script>

{% endblock %}
