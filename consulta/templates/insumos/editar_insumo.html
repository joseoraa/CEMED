
<div class="modal fade" id="editarModal{{ i.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius: 20px; overflow: hidden; shadow: 0 10px 30px rgba(0,0,0,0.2);">
            
            <form method="POST" action="{% url 'editar_insumo' i.id %}">
                {% csrf_token %}

                <div class="modal-header border-0 d-flex justify-content-between align-items-center" 
                     style="background: linear-gradient(90deg, #0744ac, #11b5cb); padding: 1.5rem;">
                    <h5 class="modal-title fw-bold text-white text-center w-100" style="letter-spacing: 1px;">
                        <i class="fa-solid fa-pen-to-square me-2"></i> EDITAR INSUMO
                    </h5>
                    <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4 bg-light">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Código</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-solid fa-barcode text-primary"></i></span>
                                <input type="text" name="codigo_ins" class="form-control" value="{{ i.codigo_ins }}" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Nombre del Insumo</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-solid fa-box text-primary"></i></span>
                                <input type="text" name="nombre_ins" class="form-control" value="{{ i.nombre_ins }}" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Presentación</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-solid fa-vial text-primary"></i></span>
                                <input type="text" name="presentacion_ins" class="form-control" value="{{ i.presentacion_ins }}" placeholder="Ej: Frasco 500ml" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Stock / Cantidad</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-solid fa-layer-group text-primary"></i></span>
                                <input type="number" name="cantidad_ins" class="form-control" value="{{ i.cantidad_ins }}" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Precio Unitario ($)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-solid fa-hand-holding-dollar text-primary"></i></span>
                                <input type="number" step="0.01" name="precio_unitario_ins" class="form-control" value="{{ i.precio_unitario_ins}}" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Fecha de Caducidad</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-solid fa-calendar-xmark text-primary"></i></span>
                                <input type="date" name="fecha_caducidad_ins" class="form-control" value="{{ i.fecha_caducidad_ins|date:'Y-m-d' }}" required>
                            </div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Proveedor</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-solid fa-truck-field text-primary"></i></span>
                                <input type="text" name="proveedor_ins" class="form-control" value="{{ i.proveedor_ins }}">
                            </div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Descripción Adicional</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white align-items-start pt-2"><i class="fa-solid fa-comment-dots text-primary"></i></span>
                                <textarea name="descripcion_ins" class="form-control" rows="3">{{ i.descripcion_ins }}</textarea>
                            </div>
                        </div>
                    </div>
                </div>

                        <div class="d-flex justify-content-center mb-3 ">
                            <button type="submit" class="btn btn-pro btn-guardar btn-square btn-square-lg"><i class="fas fa-save"></i>
                            </button>
                        </div>

                    </form>

                    </div>
                </div>
                </div>
