{% extends "Inicio/base.html" %}
{% block content %}

<div class="container mt-5">
    <h1 class="page-title text-center">
        <i class="bi bi-person-badge-fill"></i> Listado de Doctores
    </h1>
    <div class="divider"></div>

    <div class="mb-4">
        <input type="text" id="buscarDoctor" class="form-control form-control-lg" placeholder="🔍 Buscar por cédula o nombre...">
    </div>

    <div id="alertMensajes" class="mt-3"></div>

    <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-medical-blue text-white">
                    <tr>
                        <th>#</th>
                        <th style="cursor:pointer" onclick="cambiarOrden('cedula')">Cédula <span id="iconoCedula">⬍</span></th>
                        <th style="cursor:pointer" onclick="cambiarOrden('nombre')">Nombre <span id="iconoNombre">⬍</span></th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Especialidad</th>
                    </tr>
                </thead>
                <tbody id="tablaDoctores"></tbody>
            </table>
        </div>
        <!-- Contenedor de Paginación -->
        <div id="paginacionDoctores" class="py-3 d-flex justify-content-center"></div>
    </div>
</div>

<script>
const inputBusqueda = document.getElementById('buscarDoctor');
const cuerpoTabla = document.getElementById('tablaDoctores');
const divPaginacion = document.getElementById('paginacionDoctores');

let ordenActual = 'apellido';
let timeoutBusqueda = null;

// Carga inicial
document.addEventListener('DOMContentLoaded', () => cargarDoctores());

function cargarDoctores(query = '', page = 1, order = 'apellido') {
    ordenActual = order;
    fetch(`/buscar-doctores/?q=${query}&page=${page}&order=${order}`)
        .then(res => res.json())
        .then(data => {
            renderTabla(data.doctores, data.number);
            renderPaginacion(data);
        })
        .catch(err => console.error("Error cargando doctores:", err));
}

function renderTabla(doctores, pageNum) {
    cuerpoTabla.innerHTML = '';
    if (doctores.length === 0) {
        cuerpoTabla.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No se encontraron resultados</td></tr>';
        return;
    }

    doctores.forEach((d, index) => {
        const correlativo = ((pageNum - 1) * 5) + (index + 1);
        cuerpoTabla.innerHTML += `
            <tr>
                <td>${correlativo}</td>
                <td>${d.cedula}</td>
                <td>${d.nombre}</td>
                <td>${d.email}</td>
                <td>${d.telefono}</td>
                <td>${d.especialidad}</td>
            </tr>`;
    });
}

function renderPaginacion(data) {
    divPaginacion.innerHTML = '';
    
    // Si no hay más de una página, no renderizamos nada
    if (data.num_pages <= 1) return;

    const query = inputBusqueda.value.trim();
    
    let html = `
        <nav>
            <ul class="pagination mb-0">
                <li class="page-item ${!data.has_previous ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="event.preventDefault(); cargarDoctores('${query}', ${data.number - 1}, '${ordenActual}')">Anterior</a>
                </li>
                <li class="page-item active">
                    <span class="page-link">Página ${data.number} de ${data.num_pages}</span>
                </li>
                <li class="page-item ${!data.has_next ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="event.preventDefault(); cargarDoctores('${query}', ${data.number + 1}, '${ordenActual}')">Siguiente</a>
                </li>
            </ul>
        </nav>`;
    
    divPaginacion.innerHTML = html;
}

// Lógica de ordenamiento (ahora pide al servidor)
function cambiarOrden(campo) {
    let nuevoOrden = campo;
    if (ordenActual === campo) {
        nuevoOrden = `-${campo}`; // Si clickeas de nuevo, invierte (Django style)
    }
    
    // Actualizar iconos
    document.getElementById('iconoCedula').textContent = nuevoOrden.includes('cedula') ? (nuevoOrden.startsWith('-') ? '⬇️' : '⬆️') : '⬍';
    document.getElementById('iconoNombre').textContent = nuevoOrden.includes('nombre') ? (nuevoOrden.startsWith('-') ? '⬇️' : '⬆️') : '⬍';
    
    cargarDoctores(inputBusqueda.value.trim(), 1, nuevoOrden);
}

// Buscador con retraso para no saturar el servidor
inputBusqueda.addEventListener('input', () => {
    clearTimeout(timeoutBusqueda);
    timeoutBusqueda = setTimeout(() => {
        cargarDoctores(inputBusqueda.value.trim(), 1, ordenActual);
    }, 400);
});
</script>

<style>
    /* Asegúrate de tener este color definido */
    .bg-medical-blue { background-color: #0d6efd !important; }
    .page-link { cursor: pointer; }
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

{% endblock %}
