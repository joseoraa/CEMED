<div class="modal fade" id="eliminarModal{{e.id}}" tabindex="-1">

    <div class="modal-dialog">
        <div class="modal-content">

        <form method="POST" action="{% url 'eliminar_examen' e.id %}">
            {% csrf_token %}

            <div class="modal-header bg-danger text-white">
                <h5 class="text-center"> <i class="fas fa-trash"></i> Eliminar Examen </h5>
            </div>

            <div class="modal-body text-center">

                ¿Seguro que deseas eliminar
                <b>{{e.nom_exa}}</b> ?

            </div>

            <div class="modal-footer justify-content-center">

                <button class="btn btn-pro btn-x btn-square btn-square-lg"
                data-bs-dismiss="modal">
                <i class="fas fa-x me-2"></i>
                </button>

                <button class="btn btn-pro btn-delete btn-square btn-square-lg">
                <i class="fas fa-trash me-2"></i> 
                </button>

            </div>

        </form>

        </div>
    </div>
</div>
